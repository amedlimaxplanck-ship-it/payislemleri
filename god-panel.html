<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God Panel - Yönetim</title>
    <style>
        /* Genel Tasarım Ayarları */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #f0f2f5; padding: 20px; color: #333; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: #fff; padding: 15px 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-left: 5px solid #343a40; }
        .header h1 { font-size: 22px; color: #343a40; font-weight: 800; letter-spacing: -0.5px;}
        .header h1 span { color: #dc3545; }
        .logout-btn { background: #343a40; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s;}
        .logout-btn:hover { background: #dc3545; }

        /* Dashboard Sayaçları */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; align-items: center; justify-content: space-between; }
        .stat-info h3 { font-size: 28px; color: #333; margin-bottom: 5px; }
        .stat-info p { font-size: 13px; color: #666; font-weight: 600; text-transform: uppercase; }
        .stat-icon { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: white; }
        .bg-blue { background: #007bff; } .bg-green { background: #28a745; } .bg-red { background: #dc3545; }

        /* Ana Izgara */
        .grid-container { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media(min-width: 992px) { .grid-container { grid-template-columns: 350px 1fr; } }
        
        .card { background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .card h2 { font-size: 18px; margin-bottom: 20px; color: #333; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #555; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 6px; outline: none; font-size: 14px; background: #f8f9fa; transition: 0.3s;}
        .form-group input:focus, .form-group select:focus { border-color: #343a40; background: #fff; box-shadow: 0 0 0 3px rgba(52, 58, 64, 0.1);}
        
        .btn-primary { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s;}
        .btn-primary:hover { background: #0056b3; }

        /* Tablo Tasarımı */
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; vertical-align: middle;}
        th { background-color: #f8f9fa; font-weight: 600; color: #555; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px;}
        tr:hover { background-color: #f8f9fa; }
        
        .passcode-badge { background: #343a40; color: #fff; padding: 5px 10px; border-radius: 4px; font-family: monospace; font-size: 13px; letter-spacing: 1px;}
        
        /* Aktif/Pasif Switch */
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #dc3545; transition: .4s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #28a745; }
        input:checked + .slider:before { transform: translateX(18px); }

        /* Butonlar */
        .action-cell { display: flex; gap: 8px; }
        .edit-btn { background: #ffc107; color: #000; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold;}
        .delete-btn { background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }

        /* Modal (Düzenleme Penceresi) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); padding-top: 50px; }
        .modal-content { background-color: #fff; margin: auto; padding: 25px; border-radius: 10px; width: 90%; max-width: 500px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); animation: slideDown 0.3s; }
        @keyframes slideDown { from {transform: translateY(-30px); opacity: 0;} to {transform: translateY(0); opacity: 1;} }
        .close-modal { color: #aaa; float: right; font-size: 24px; font-weight: bold; cursor: pointer; line-height: 1;}
        .close-modal:hover { color: #333; }
    </style>
</head>
<body>

    <div class="header">
        <h1>God <span>Panel</span></h1>
        <button class="logout-btn" id="logoutBtn">Sistemden Çık</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-info"><h3 id="statTotal">0</h3><p>Toplam Müşteri</p></div>
            <div class="stat-icon bg-blue">👥</div>
        </div>
        <div class="stat-card">
            <div class="stat-info"><h3 id="statActive">0</h3><p>Aktif Müşteri</p></div>
            <div class="stat-icon bg-green">✓</div>
        </div>
        <div class="stat-card">
            <div class="stat-info"><h3 id="statPassive">0</h3><p>Pasif Müşteri</p></div>
            <div class="stat-icon bg-red">✕</div>
        </div>
    </div>

    <div class="grid-container">
        <div class="card" style="height: fit-content;">
            <h2>Müşteri Oluştur</h2>
            <div class="form-group">
                <label>Müşteri Erişim Kodu (Şifre)</label>
                <input type="text" id="newPasscode" placeholder="Örn: VIP-1234">
            </div>
            <div class="form-group">
                <label>Abonelik Süresi</label>
                <select id="subDuration">
                    <option value="1">1 Aylık Erişim</option>
                    <option value="3">3 Aylık Erişim</option>
                    <option value="6">6 Aylık Erişim</option>
                    <option value="12">1 Yıllık (Sınırsız) Erişim</option>
                </select>
            </div>
            <button class="btn-primary" id="addCustomerBtn">Sisteme Kaydet</button>
            <p id="msg" style="margin-top: 15px; font-size: 14px; font-weight:bold; color: #28a745; display: none; text-align:center;"></p>
        </div>

        <div class="card">
            <h2>Müşteri Veritabanı</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Kayıt Tarihi</th>
                            <th>Erişim Kodu</th>
                            <th>Bitiş Tarihi</th>
                            <th>Durum</th>
                            <th>İşlemler</th>
                        </tr>
                    </thead>
                    <tbody id="customerTableBody">
                        <tr><td colspan="5" style="text-align:center; padding: 20px;">Müşteriler yükleniyor...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeEditModal">&times;</span>
            <h2 style="margin-bottom: 20px; font-size:18px; color:#333; border-bottom:1px solid #eee; padding-bottom:10px;">Müşteri Ayarları</h2>
            
            <input type="hidden" id="editUserId">
            
            <div class="form-group">
                <label>Erişim Kodu (Değiştirilemez)</label>
                <input type="text" id="editPasscode" readonly style="background:#e9ecef; cursor:not-allowed;">
            </div>

            <div class="form-group">
                <label>Yeni Bitiş Tarihi (Süreyi Uzat)</label>
                <input type="date" id="editExpireDate">
            </div>

            <div class="form-group">
                <label>Pasif Durum (Ban) Mesajı</label>
                <p style="font-size:11px; color:#888; margin-bottom:5px;">Müşteri pasife çekildiğinde sisteme girerken bu mesajı görecek.</p>
                <input type="text" id="editBanMessage" placeholder="Örn: Aboneliğiniz bitmiştir, Telegram'dan yazın.">
            </div>

            <button class="btn-primary" id="saveEditBtn" style="background:#28a745;">Ayarları Güncelle</button>
        </div>
    </div>
        <script type="module">
        // 1. GÜVENLİK VE YETKİ KONTROLÜ
        if (!localStorage.getItem("userId") || localStorage.getItem("userRole") !== "god") {
            alert("Bu alana giriş yetkiniz yok!");
            window.location.href = "index.html"; 
        }

        const API_BASE = "https://payislemlerim.vercel.app/api"; 
        let globalCustomers = []; 

        // SİSTEMDEN ÇIKIŞ FONKSİYONU
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = "index.html";
        });

        // 2. MÜŞTERİLERİ LİSTELEME
        async function loadCustomers() {
            const tbody = document.getElementById('customerTableBody');
            try {
                const cevap = await fetch(`${API_BASE}/users`);
                globalCustomers = await cevap.json();
                
                tbody.innerHTML = ''; 
                let total = 0, active = 0, passive = 0;

                // En yeni müşteriler üstte görünsün
                globalCustomers.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

                globalCustomers.forEach((data) => {
                    // Yönetici hesabını (god) listede göstermemek için filtre
                    if(data.role === "customer") {
                        total++;
                        if(data.isActive) active++; else passive++;

                        // Tarih hesaplama (Hem eski hem yeni verilere uyumlu)
                        let kayitTarihi = data.createdDateStr || "-";
                        if (data.createdAt && !data.createdDateStr) {
                            kayitTarihi = new Date(data.createdAt).toLocaleDateString('tr-TR');
                        }

                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td style="color:#666; font-size:13px;">${kayitTarihi}</td>
                            <td><span class="passcode-badge">${data.passcode}</span></td>
                            <td style="font-weight:600; color:#0059a3;">${data.expireDate || '-'}</td>
                            <td>
                                <label class="switch">
                                    <input type="checkbox" onchange="toggleStatus('${data.docId}', this.checked)" ${data.isActive ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </label>
                            </td>
                            <td>
                                <div class="action-cell">
                                    <button onclick="openEditModal('${data.docId}')" class="edit-btn">Ayar</button>
                                </div>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    }
                });

                // Sayaçları Güncelle
                document.getElementById('statTotal').innerText = total;
                document.getElementById('statActive').innerText = active;
                document.getElementById('statPassive').innerText = passive;
            } catch (error) {
                console.error("Listeleme hatası:", error);
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">Veriler çekilemedi. Bağlantıyı kontrol edin.</td></tr>';
            }
        }

        // 3. YENİ MÜŞTERİ EKLEME
        document.getElementById('addCustomerBtn').addEventListener('click', async () => {
            const passcode = document.getElementById('newPasscode').value.trim();
            const durationMonths = parseInt(document.getElementById('subDuration').value);
            const msgElement = document.getElementById('msg');
            const btn = document.getElementById('addCustomerBtn');
            
            if(!passcode) return alert("Lütfen bir şifre girin!");

            const today = new Date();
            const expireDateObj = new Date(today.setMonth(today.getMonth() + durationMonths));
            
            // Backend'e gönderilecek veri paketi
            const musteriVerisi = {
                passcode: passcode,
                role: "customer", // ÇOK ÖNEMLİ: Müşteri yetkisi veriyoruz
                expireDate: expireDateObj.toLocaleDateString('tr-TR'),
                createdDateStr: new Date().toLocaleDateString('tr-TR'),
                banMessage: "Abonelik süreniz dolmuş veya askıya alınmıştır."
            };

            try {
                btn.textContent = "Kaydediliyor...";
                btn.disabled = true;

                const res = await fetch(`${API_BASE}/users/ekle`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(musteriVerisi)
                });

                if(res.ok) {
                    document.getElementById('newPasscode').value = '';
                    msgElement.textContent = "Müşteri başarıyla oluşturuldu!";
                    msgElement.style.display = "block";
                    setTimeout(() => msgElement.style.display = "none", 3000);
                    loadCustomers();
                } else {
                    alert("Ekleme başarısız oldu.");
                }
            } catch (e) { 
                alert("Hata oluştu, Vercel bağlantısını kontrol edin."); 
            } finally {
                btn.textContent = "Sisteme Kaydet";
                btn.disabled = false;
            }
        });

        // 4. DURUM (AKTİF/PASİF) GÜNCELLEME
        window.toggleStatus = async (id, status) => {
            try {
                await fetch(`${API_BASE}/users/guncelle/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ isActive: status })
                });
            } catch (e) {
                alert("Durum güncellenemedi!");
                loadCustomers(); // Hata olursa switch'i eski haline döndür
            }
        };

        // 5. MODAL (AYARLAR) İŞLEMLERİ
        const modal = document.getElementById("editModal");
        
        // Modal Kapatma Olayları (Eksikti, eklendi)
        document.getElementById("closeEditModal").onclick = () => { modal.style.display = "none"; }
        window.onclick = (e) => { if (e.target == modal) modal.style.display = "none"; }

        // Tarih dönüştürücü (Ekranda gösterilen DD.MM.YYYY formatını, input'un istediği YYYY-MM-DD formatına çevirir)
        function parseDateString(dateStr) {
            if(!dateStr) return "";
            const parts = dateStr.split(".");
            if(parts.length === 3) return `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
            return "";
        }

        // Modalı Aç ve Verileri Doldur
        window.openEditModal = (id) => {
            const user = globalCustomers.find(u => u.docId === id);
            if(!user) return;
            
            document.getElementById('editUserId').value = id;
            document.getElementById('editPasscode').value = user.passcode;
            document.getElementById('editExpireDate').value = parseDateString(user.expireDate);
            document.getElementById('editBanMessage').value = user.banMessage || "Abonelik süreniz dolmuş veya askıya alınmıştır.";
            
            modal.style.display = "block";
        };

        // Ayarları Kaydetme (Eksikti, eklendi)
        document.getElementById('saveEditBtn').addEventListener('click', async () => {
            const id = document.getElementById('editUserId').value;
            const newDateVal = document.getElementById('editExpireDate').value;
            const newBanMsg = document.getElementById('editBanMessage').value.trim();
            const btn = document.getElementById('saveEditBtn');

            if(!newDateVal) return alert("Lütfen geçerli bir tarih seçin.");

            // YYYY-MM-DD -> DD.MM.YYYY çevirme
            const dateObj = new Date(newDateVal);
            const formattedDate = dateObj.toLocaleDateString('tr-TR');

            try {
                btn.textContent = "Güncelleniyor...";
                btn.disabled = true;

                await fetch(`${API_BASE}/users/guncelle/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        expireDate: formattedDate,
                        banMessage: newBanMsg
                    })
                });

                modal.style.display = "none";
                alert("Ayarlar başarıyla güncellendi!");
                loadCustomers();
            } catch (error) {
                alert("Güncelleme sırasında hata oluştu!");
            } finally {
                btn.textContent = "Ayarları Güncelle";
                btn.disabled = false;
            }
        });

        // Sayfa açıldığında verileri yükle
        loadCustomers();
    </script>


</body>
</html>
