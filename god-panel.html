<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God Panel - Yönetim</title>
    <style>
        /* --- AÇIK/KOYU MOD RENK MOTORU (GOD MODE) --- */
        :root {
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #dddddd;
            --table-header: #f8f9fa;
            --input-bg: #f8f9fa;
            --god-accent: #dc3545;
            --god-header: #343a40;
            --modal-bg: rgba(0,0,0,0.5);
        }

        [data-theme="dark"] {
            --bg-body: #09090b; /* Çok derin siyah */
            --bg-card: #18181b;
            --text-main: #f8fafc;
            --text-muted: #a1a1aa;
            --border-color: #27272a;
            --table-header: #09090b;
            --input-bg: #09090b;
            --god-accent: #ef4444;
            --god-header: #18181b;
            --modal-bg: rgba(0,0,0,0.8);
        }

        /* Genel Tasarım Ayarları */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; transition: background-color 0.3s, border-color 0.3s, color 0.3s;}
        body { background-color: var(--bg-body); padding: 20px; color: var(--text-main); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: var(--bg-card); padding: 15px 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid var(--god-accent); border-top: 1px solid var(--border-color); border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); }
        .header h1 { font-size: 22px; color: var(--text-main); font-weight: 800; letter-spacing: -0.5px;}
        .header h1 span { color: var(--god-accent); }
        
        .header-controls { display: flex; align-items: center; gap: 20px; }
        
        /* --- EMOJİSİZ JİLET GİBİ ŞALTER --- */
        .theme-switch { position: relative; width: 48px; height: 24px; display: inline-block; }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .theme-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; border: 1px solid rgba(0,0,0,0.1); }
        .theme-slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 2px; bottom: 2px; background-color: white; transition: .4s cubic-bezier(0.68, -0.55, 0.265, 1.55); border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        input:checked + .theme-slider { background-color: var(--god-accent); border-color: var(--god-accent); }
        input:checked + .theme-slider:before { transform: translateX(24px); }

        .logout-btn { background: var(--god-header); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;}
        .logout-btn:hover { background: var(--god-accent); }

        /* Dashboard Sayaçları */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: var(--bg-card); padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border-color); }
        .stat-info h3 { font-size: 32px; color: var(--text-main); margin-bottom: 5px; font-weight: 900;}
        .stat-info p { font-size: 13px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;}
        .stat-icon { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: white; }
        .bg-blue { background: #3b82f6; } .bg-green { background: #10b981; } .bg-red { background: var(--god-accent); }

        /* Ana Izgara */
        .grid-container { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media(min-width: 992px) { .grid-container { grid-template-columns: 350px 1fr; } }
        
        .card { background: var(--bg-card); padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--border-color); }
        .card h2 { font-size: 18px; margin-bottom: 20px; color: var(--text-main); font-weight: 700; display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 0.5px;}
        
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 12px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;}
        .form-group input, .form-group select { width: 100%; padding: 14px 15px; border: 1px solid var(--border-color); border-radius: 8px; outline: none; font-size: 14px; background: var(--input-bg); color: var(--text-main); transition: 0.3s;}
        .form-group input:focus, .form-group select:focus { border-color: var(--god-accent); box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.15);}
        
        .btn-primary { width: 100%; padding: 16px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 14px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;}
        .btn-primary:hover { background: #0056b3; transform: translateY(-2px); }

        /* Tablo Tasarımı */
        .table-responsive { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border-color);}
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 16px 15px; text-align: left; border-bottom: 1px solid var(--border-color); font-size: 14px; vertical-align: middle; color: var(--text-main);}
        th { background-color: var(--table-header); font-weight: 800; color: var(--text-muted); text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px;}
        tr:hover { background-color: var(--bg-body); }
        
        .passcode-badge { background: var(--god-header); color: #fff; padding: 6px 12px; border-radius: 6px; font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; letter-spacing: 2px;}
        
        /* Aktif/Pasif Switch */
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #dc3545; transition: .4s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(18px); }

        /* Butonlar */
        .action-cell { display: flex; gap: 8px; }
        .edit-btn { background: #f59e0b; color: #fff; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; text-transform: uppercase;}

        /* Modal (Düzenleme Penceresi) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: var(--modal-bg); padding-top: 50px; backdrop-filter: blur(4px);}
        .modal-content { background-color: var(--bg-card); border: 1px solid var(--border-color); margin: auto; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; box-shadow: 0 15px 40px rgba(0,0,0,0.4); animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideDown { from {transform: translateY(-30px) scale(0.95); opacity: 0;} to {transform: translateY(0) scale(1); opacity: 1;} }
        .close-modal { color: var(--text-muted); float: right; font-size: 28px; font-weight: bold; cursor: pointer; line-height: 1;}
        .close-modal:hover { color: var(--god-accent); }

        /* --- SKELETON YÜKLEME --- */
        .skeleton-row td { position: relative; overflow: hidden; }
        .skeleton-box { height: 20px; background: var(--bg-body); border-radius: 4px; width: 100%; position: relative; overflow: hidden; }
        .skeleton-box::after { content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); animation: skeletonSweep 1.5s infinite; }
        @keyframes skeletonSweep { 100% { left: 100%; } }

        /* --- TOAST BİLDİRİMLERİ --- */
        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 999999; display: flex; flex-direction: column; gap: 15px; pointer-events: none; }
        .toast { min-width: 280px; background: var(--bg-card); border-left: 4px solid; padding: 15px 20px; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); color: var(--text-main); font-weight: bold; font-size: 13px; opacity: 0; transform: translateX(100%); transition: all 0.4s ease; display: flex; flex-direction: column; border-top: 1px solid var(--border-color); border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); }
        .toast.show { opacity: 1; transform: translateX(0); }
        .toast.success { border-left-color: #10b981; }
        .toast.error { border-left-color: #ef4444; }
        .toast.info { border-left-color: #3b82f6; }
        .toast-title { font-size: 11px; text-transform: uppercase; opacity: 0.7; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>God <span>Panel</span></h1>
        <div class="header-controls">
            <label class="theme-switch">
                <input type="checkbox" id="themeToggle">
                <div class="theme-slider"></div>
            </label>
            <button class="logout-btn" id="logoutBtn">Sistemden Çık</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-info"><h3 id="statTotal">0</h3><p>Toplam Müşteri</p></div>
            <div class="stat-icon bg-blue">👥</div>
        </div>
        <div class="stat-card">
            <div class="stat-info"><h3 id="statActive">0</h3><p>Aktif Müşteri</p></div>
            <div class="stat-icon bg-green">✓</div>
        </div>
        <div class="stat-card">
            <div class="stat-info"><h3 id="statPassive">0</h3><p>Pasif Müşteri</p></div>
            <div class="stat-icon bg-red">✕</div>
        </div>
    </div>

    <div class="grid-container">
        <div class="card" style="height: fit-content;">
            <h2>Müşteri Oluştur</h2>
            <div class="form-group">
                <label>Müşteri Erişim Kodu (Şifre)</label>
                <input type="text" id="newPasscode" placeholder="Örn: VIP-1234" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Abonelik Süresi</label>
                <select id="subDuration">
                    <option value="1">1 Aylık Erişim</option>
                    <option value="3">3 Aylık Erişim</option>
                    <option value="6">6 Aylık Erişim</option>
                    <option value="12">1 Yıllık (Sınırsız) Erişim</option>
                </select>
            </div>
            <button class="btn-primary" id="addCustomerBtn">Sisteme Kaydet</button>
        </div>

        <div class="card">
            <h2>Müşteri Veritabanı</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Kayıt Tarihi</th>
                            <th>Erişim Kodu</th>
                            <th>Bitiş Tarihi</th>
                            <th>Durum</th>
                            <th>İşlemler</th>
                        </tr>
                    </thead>
                    <tbody id="customerTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeEditModal">&times;</span>
            <h2 style="margin-bottom: 20px; font-size:18px; color:var(--text-main); border-bottom:1px solid var(--border-color); padding-bottom:10px; text-transform: uppercase;">Müşteri Ayarları</h2>
            
            <input type="hidden" id="editUserId">
            
            <div class="form-group">
                <label>Erişim Kodu (Değiştirilemez)</label>
                <input type="text" id="editPasscode" readonly style="background:var(--bg-body); cursor:not-allowed;">
            </div>

            <div class="form-group">
                <label>Yeni Bitiş Tarihi (Süreyi Uzat)</label>
                <input type="date" id="editExpireDate">
            </div>

            <div class="form-group">
                <label>Pasif Durum (Ban) Mesajı</label>
                <p style="font-size:11px; color:var(--text-muted); margin-bottom:6px;">Müşteri pasife çekildiğinde sisteme girerken bu mesajı görecek.</p>
                <input type="text" id="editBanMessage" placeholder="Örn: Aboneliğiniz bitmiştir, Telegram'dan yazın.">
            </div>

            <button class="btn-primary" id="saveEditBtn" style="background:#10b981; margin-top: 10px;">Ayarları Güncelle</button>
        </div>
    </div>
    
    <div id="toast-container"></div>

    <script type="module">
        // --- TEMA (DARK/LIGHT) MOTORU ---
        const themeToggle = document.getElementById('themeToggle');
        const currentTheme = localStorage.getItem('godTheme') || 'light';
        
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.checked = true;
        }

        themeToggle.addEventListener('change', function(e) {
            if (e.target.checked) {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('godTheme', 'dark');
                showToast('Karanlık mod aktif.', 'info', 'SİSTEM');
            } else {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('godTheme', 'light');
                showToast('Aydınlık mod aktif.', 'info', 'SİSTEM');
            }
        });

        // --- PROFESYONEL TOAST MOTORU ---
        window.showToast = function(message, type = 'success', title = '') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let baslik = title;
            if(!baslik) baslik = type === 'success' ? 'BAŞARILI' : (type === 'error' ? 'HATA' : 'BİLGİ');
            
            toast.innerHTML = `<span class="toast-title">${baslik}</span><span>${message}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3500);
        }

        // --- SKELETON OLUŞTURUCU ---
        function getSkeletonRows(colCount) {
            let rows = '';
            for(let i=0; i<4; i++) {
                let cols = '';
                for(let j=0; j<colCount; j++) { cols += `<td><div class="skeleton-box"></div></td>`; }
                rows += `<tr class="skeleton-row">${cols}</tr>`;
            }
            return rows;
        }

        // 1. GÜVENLİK VE YETKİ KONTROLÜ
        if (!localStorage.getItem("userId") || localStorage.getItem("userRole") !== "god") {
            window.location.href = "login.html"; 
        }

        const isLocal = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
        const API_BASE = isLocal ? 'http://localhost:3000/api' : 'https://payislemlerim.vercel.app/api'; 
        
        let globalCustomers = []; 

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = "login.html";
        });

        // 2. MÜŞTERİLERİ LİSTELEME
        async function loadCustomers() {
            const tbody = document.getElementById('customerTableBody');
            tbody.innerHTML = getSkeletonRows(5); // Skeleton efekti

            try {
                const cevap = await fetch(`${API_BASE}/users`);
                globalCustomers = await cevap.json();
                
                tbody.innerHTML = ''; 
                let total = 0, active = 0, passive = 0;

                globalCustomers.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

                globalCustomers.forEach((data) => {
                    if(data.role === "customer") {
                        total++;
                        if(data.isActive) active++; else passive++;

                        let kayitTarihi = data.createdDateStr || "-";
                        if (data.createdAt && !data.createdDateStr) {
                            kayitTarihi = new Date(data.createdAt).toLocaleDateString('tr-TR');
                        }

                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td style="color:var(--text-muted); font-size:13px; font-weight:bold;">${kayitTarihi}</td>
                            <td><span class="passcode-badge">${data.passcode}</span></td>
                            <td style="font-weight:700; color:#3b82f6;">${data.expireDate || '-'}</td>
                            <td>
                                <label class="switch">
                                    <input type="checkbox" onchange="toggleStatus('${data.docId}', this.checked)" ${data.isActive ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </label>
                            </td>
                            <td>
                                <div class="action-cell">
                                    <button onclick="openEditModal('${data.docId}')" class="edit-btn">Ayar</button>
                                </div>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    }
                });

                document.getElementById('statTotal').innerText = total;
                document.getElementById('statActive').innerText = active;
                document.getElementById('statPassive').innerText = passive;
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red; font-weight:bold;">Veriler çekilemedi. Bağlantıyı kontrol edin.</td></tr>';
                showToast("Müşteri verileri çekilirken ağ hatası oluştu.", "error", "BAĞLANTI");
            }
        }

        // 3. YENİ MÜŞTERİ EKLEME
        document.getElementById('addCustomerBtn').addEventListener('click', async () => {
            const passcode = document.getElementById('newPasscode').value.trim();
            const durationMonths = parseInt(document.getElementById('subDuration').value);
            const btn = document.getElementById('addCustomerBtn');
            
            if(!passcode) return showToast("Lütfen müşteri için bir erişim kodu belirleyin.", "error");

            const today = new Date();
            const expireDateObj = new Date(today.setMonth(today.getMonth() + durationMonths));
            
            const musteriVerisi = {
                passcode: passcode,
                role: "customer", 
                expireDate: expireDateObj.toLocaleDateString('tr-TR'),
                createdDateStr: new Date().toLocaleDateString('tr-TR'),
                banMessage: "Abonelik süreniz dolmuş veya askıya alınmıştır."
            };

            try {
                btn.textContent = "Kaydediliyor...";
                btn.disabled = true;

                const res = await fetch(`${API_BASE}/users/ekle`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(musteriVerisi)
                });

                if(res.ok) {
                    document.getElementById('newPasscode').value = '';
                    showToast("Yeni müşteri başarıyla sisteme kaydedildi.", "success");
                    loadCustomers();
                } else {
                    showToast("Müşteri kaydı başarısız oldu.", "error");
                }
            } catch (e) { 
                showToast("Sunucuyla iletişim kurulamadı.", "error");
            } finally {
                btn.textContent = "Sisteme Kaydet";
                btn.disabled = false;
            }
        });

        // 4. DURUM (AKTİF/PASİF) GÜNCELLEME
        window.toggleStatus = async (id, status) => {
            try {
                await fetch(`${API_BASE}/users/guncelle/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ isActive: status })
                });
                showToast(status ? "Müşteri aktif edildi." : "Müşteri pasife çekildi (Ban).", "info");
            } catch (e) {
                showToast("Durum güncellenemedi, sunucu hatası.", "error");
                loadCustomers(); 
            }
        };

        // 5. MODAL (AYARLAR) İŞLEMLERİ
        const modal = document.getElementById("editModal");
        
        document.getElementById("closeEditModal").onclick = () => { modal.style.display = "none"; }
        window.onclick = (e) => { if (e.target == modal) modal.style.display = "none"; }

        function parseDateString(dateStr) {
            if(!dateStr) return "";
            const parts = dateStr.split(".");
            if(parts.length === 3) return `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
            return "";
        }

        window.openEditModal = (id) => {
            const user = globalCustomers.find(u => u.docId === id);
            if(!user) return;
            
            document.getElementById('editUserId').value = id;
            document.getElementById('editPasscode').value = user.passcode;
            document.getElementById('editExpireDate').value = parseDateString(user.expireDate);
            document.getElementById('editBanMessage').value = user.banMessage || "Abonelik süreniz dolmuş veya askıya alınmıştır.";
            
            modal.style.display = "block";
        };

        document.getElementById('saveEditBtn').addEventListener('click', async () => {
            const id = document.getElementById('editUserId').value;
            const newDateVal = document.getElementById('editExpireDate').value;
            const newBanMsg = document.getElementById('editBanMessage').value.trim();
            const btn = document.getElementById('saveEditBtn');

            if(!newDateVal) return showToast("Lütfen geçerli bir bitiş tarihi seçin.", "error");

            const dateObj = new Date(newDateVal);
            const formattedDate = dateObj.toLocaleDateString('tr-TR');

            try {
                btn.textContent = "Güncelleniyor...";
                btn.disabled = true;

                await fetch(`${API_BASE}/users/guncelle/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        expireDate: formattedDate,
                        banMessage: newBanMsg
                    })
                });

                modal.style.display = "none";
                showToast("Müşteri ayarları güncellendi.", "success");
                loadCustomers();
            } catch (error) {
                showToast("Ayarlar güncellenirken hata oluştu.", "error");
            } finally {
                btn.textContent = "Ayarları Güncelle";
                btn.disabled = false;
            }
        });

        loadCustomers();
    </script>
</body>
</html>
