<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Girişi | Güvenli Erişim Protokolü</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            /* Zifiri Karanlık Ana Arka Plan */
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #f8fafc;
            overflow: hidden;
            position: relative;
        }

        /* --- AMBIENT GLOW (Arka Plandaki Uçuşan Sisler) --- */
        .glow-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 1;
            opacity: 0.4;
            animation: floatGlow 25s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glow-1 {
            width: 500px; height: 500px;
            background: #1e3a8a; /* Derin Gece Mavisi */
            top: -150px; left: -200px;
        }

        .glow-2 {
            width: 450px; height: 450px;
            background: #4c1d95; /* Koyu Lüks Mor */
            bottom: -150px; right: -150px;
            animation-delay: -7s;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(60px, 40px) scale(1.1); }
            100% { transform: translate(-40px, -60px) scale(0.9); }
        }

        /* --- TAKIMYILDIZ AĞI (Moving Constellation Network) --- */
        .constellation {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 2;
            opacity: 0.1;
            animation: moveNetwork 60s linear infinite;
        }

        @keyframes moveNetwork {
            from { background-position: 0 0; }
            to { background-position: 500px 500px; }
        }

        /* Canlı Sistem Saati ve Güvenlik İbaresi */
        .system-clock {
            position: absolute;
            top: 25px;
            right: 35px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            color: #475569;
            letter-spacing: 1px;
            text-align: right;
            z-index: 20;
            line-height: 1.6;
        }

        .system-clock span.secure { color: #10b981; font-weight: bold; }
        .system-clock span.time { color: #f8fafc; font-weight: bold; }

        .status-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            background-color: #10b981;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
            vertical-align: middle;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* Ana Giriş Kutusu (Gerçek Buzlu Cam) */
        .login-container {
            background-color: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 55px 45px;
            border-radius: 20px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
            z-index: 10;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-container h2 {
            color: #f1f5f9;
            margin-bottom: 5px;
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .login-container p {
            color: #64748b;
            margin-bottom: 45px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .input-group {
            margin-bottom: 35px;
            text-align: left;
            position: relative;
        }

        .input-badge {
            position: absolute;
            top: -24px;
            right: 0;
            font-size: 10px;
            color: #334155;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 1.5px;
        }

        .input-group input {
            width: 100%;
            padding: 18px;
            background-color: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff; 
            font-size: 24px; 
            outline: none;
            transition: all 0.3s;
            text-align: center;
            letter-spacing: 12px; 
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .input-group input:focus {
            border-color: #3b82f6;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 0 25px rgba(59, 130, 246, 0.2);
            background-color: rgba(0, 0, 0, 0.6);
        }

        .input-group input::placeholder {
            color: #2a3042;
            letter-spacing: 4px;
            font-size: 14px;
            font-weight: normal;
        }

        /* Apple Tarzı Premium Buton */
        button {
            width: 100%;
            padding: 18px;
            background: #f1f5f9;
            color: #0f172a; 
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 58px;
        }

        button:hover {
            background: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        button:disabled {
            background: #334155;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Spinner (Yükleme Halkası) */
        .spinner {
            border: 3px solid rgba(15, 23, 42, 0.1);
            border-top: 3px solid #0f172a;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Hata Mesajı (Kırmızı Titreyen Kutu) */
        #error-message {
            background-color: rgba(220, 38, 38, 0.12);
            color: #fca5a5;
            border: 1px solid rgba(220, 38, 38, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin-top: 25px;
            font-size: 13px;
            display: none;
            font-weight: 600;
            letter-spacing: 0.5px;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%, 75% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
        }

        /* Anonim Güvenlik İbaresi */
        .security-footer {
            margin-top: 35px;
            font-size: 10px;
            color: #475569;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="glow-blob glow-1"></div>
    <div class="glow-blob glow-2"></div>
    
    <div class="constellation"></div>

    <div class="system-clock">
        <span class="secure"><span class="status-dot"></span> SECURE_SESSION</span><br>
        SYS_TIME: <span id="clock" class="time">...</span><br>
        NODE: <span style="color:#64748b;">RELAY-X19</span>
    </div>

    <div class="login-container">
        <h2>Güvenli Erişim</h2>
        <p>Protokol Doğrulaması</p>
        
        <div class="input-group">
            <span class="input-badge">PROTOCOL_V5</span>
            <input type="password" id="accessCode" placeholder="GİZLİ ANAHTAR" autocomplete="off">
        </div>
        
        <button id="loginBtn">
            <span id="btnText">Doğrulama Başlat</span>
            <div class="spinner" id="btnSpinner"></div>
        </button>
        
        <div id="error-message">Hatalı veya süresi dolmuş kod!</div>

        <div class="security-footer">
            [ AES-256 | TLS 1.3 | ZERO_TRUST ]
        </div>
    </div>

    <script type="module">
        // Canlı Saat Fonksiyonu
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('tr-TR');
            const dateStr = now.toLocaleDateString('tr-TR');
            document.getElementById('clock').innerText = dateStr + " " + timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const accessCodeInput = document.getElementById('accessCode');
        const errorMessage = document.getElementById('error-message');

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.style.display = 'block';
        }

        loginBtn.addEventListener('click', async () => {
            const code = accessCodeInput.value.trim();
            errorMessage.style.display = 'none';
            
            if (code === "") {
                showError("Lütfen güvenlik anahtarını girin.");
                return;
            }

            // Tasarım animasyonunu başlat
            btnText.style.display = 'none';
            btnSpinner.style.display = 'block';
            loginBtn.disabled = true;

            try {
                // Senin orijinal API rotan (Yerel testteysen yerel sunucuya atar, Vercel'deysen normal çalışır)
                const isLocal = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
                const apiUrl = isLocal ? 'http://localhost:3000/api/login' : '/api/login';

                const cevap = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code }) 
                });

                const sonuc = await cevap.json();

                // Senin orijinal yetkilendirme ve yönlendirme mantığın
                if (sonuc.success) {
                    localStorage.setItem("userId", sonuc.user.id);
                    localStorage.setItem("userRole", sonuc.user.role);
                    
                    if (sonuc.user.role === "god") {
                        window.location.href = "god-panel.html"; 
                    } else if (sonuc.user.role === "customer") {
                        if (sonuc.user.isActive === true) {
                            window.location.href = "musteri-panel.html"; 
                        } else {
                            showError(sonuc.user.banMessage || "Abonelik süreniz dolmuş veya askıya alınmıştır.");
                        }
                    } else {
                        showError("Sistem hatası: Bu şifrenin yetkisi tanımlanmamış.");
                    }
                } else {
                    showError(sonuc.message || "Giriş başarısız. Şifreyi kontrol edin.");
                }
            } catch (error) {
                console.error("Hata Detayı:", error);
                showError("Sunucu bağlantı hatası. Vercel uykuda veya internet yok.");
            } finally {
                // Tasarım animasyonunu durdur
                btnText.style.display = 'block';
                btnText.innerText = "Tekrar Dene";
                btnSpinner.style.display = 'none';
                loginBtn.disabled = false;
            }
        });

        // Enter tuşuyla girebilme rahatlığı
        accessCodeInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') loginBtn.click();
        });
    </script>

</body>
</html>
