<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Girişi</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-container h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .login-container p {
            color: #777;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
            letter-spacing: 2px;
        }
        .input-group input:focus {
            border-color: #007bff;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        /* YENİ: Daha Şık Uyarı Kutusu Tasarımı */
        #error-message {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            padding: 12px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 14px;
            line-height: 1.4;
            display: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Sisteme Giriş</h2>
        <p>Lütfen erişim kodunuzu girin</p>
        
        <div class="input-group">
            <input type="password" id="accessCode" placeholder="Erişim Kodu" autocomplete="off">
        </div>
        
        <button id="loginBtn">Giriş Yap</button>
        <div id="error-message">Hatalı veya süresi dolmuş kod!</div>
    </div>

    <script type="module">
        // Artık Firebase'i değil, kendi Vercel linkini çağırıyorsun
const cevap = await fetch('https://senin-vercel-linkin.vercel.app/api/ilan/12345');
const ilanData = await cevap.json();


        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const loginBtn = document.getElementById('loginBtn');
        const accessCodeInput = document.getElementById('accessCode');
        const errorMessage = document.getElementById('error-message');

        loginBtn.addEventListener('click', async () => {
            const code = accessCodeInput.value.trim();
            errorMessage.style.display = 'none';
            
            if (code === "") {
                showError("Lütfen erişim kodunuzu girin!");
                return;
            }

            loginBtn.textContent = "Bağlanıyor...";
            loginBtn.disabled = true;

            try {
                const usersRef = collection(db, "users");
                const q = query(usersRef, where("passcode", "==", code));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    showError("Girdiğiniz erişim kodu sistemde bulunamadı!");
                } else {
                    querySnapshot.forEach((doc) => {
                        const userData = doc.data();
                        
                        if (userData.role === "god") {
                            localStorage.setItem("userId", doc.id);
                            localStorage.setItem("userRole", "god");
                            window.location.href = "god-panel.html"; 
                        } 
                        else if (userData.role === "customer") {
                            if (userData.isActive === true) {
                                localStorage.setItem("userId", doc.id);
                                localStorage.setItem("userRole", "customer");
                                window.location.href = "musteri-panel.html"; 
                            } else {
                                // YENİ: God Panel'den yazdığın özel mesajı buraya çeker
                                const ozelMesaj = userData.banMessage || "Abonelik süreniz dolmuş veya askıya alınmıştır. Lütfen yönetici ile iletişime geçiniz.";
                                showError(ozelMesaj);
                            }
                        } else {
                            showError("Sistem hatası: Bu şifrenin yetkisi tanımlanmamış.");
                        }
                    });
                }
            } catch (error) {
                showError("Sunucu bağlantı hatası. Lütfen internetinizi kontrol edin.");
            } finally {
                loginBtn.textContent = "Giriş Yap";
                loginBtn.disabled = false;
            }
        });

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.style.display = 'block';
        }
    </script>
</body>
</html>
