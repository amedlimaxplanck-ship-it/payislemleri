<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Girişi</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-container h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .login-container p {
            color: #777;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
            letter-spacing: 2px;
        }
        .input-group input:focus {
            border-color: #007bff;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        /* YENİ: Daha Şık Uyarı Kutusu Tasarımı */
        #error-message {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            padding: 12px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 14px;
            line-height: 1.4;
            display: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Sisteme Giriş</h2>
        <p>Lütfen erişim kodunuzu girin</p>
        
        <div class="input-group">
            <input type="password" id="accessCode" placeholder="Erişim Kodu" autocomplete="off">
        </div>
        
        <button id="loginBtn">Giriş Yap</button>
        <div id="error-message">Hatalı veya süresi dolmuş kod!</div>
    </div>

        <script type="module">
        const loginBtn = document.getElementById('loginBtn');
        const accessCodeInput = document.getElementById('accessCode');
        const errorMessage = document.getElementById('error-message');

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.style.display = 'block';
        }

        loginBtn.addEventListener('click', async () => {
            const code = accessCodeInput.value.trim();
            errorMessage.style.display = 'none';
            
            if (code === "") {
                showError("Lütfen erişim kodunuzu girin!");
                return;
            }

            loginBtn.textContent = "Bağlanıyor...";
            loginBtn.disabled = true;

            try {
                // HATA BURADAYDI: Başına // ekledik, artık kod bozulmaz.
                // Node.js sunucuna (Backend) soruyoruz
                const cevap = await fetch(`https://payislemlerim.vercel.app/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code }) 
                });

                const sonuc = await cevap.json();

                if (sonuc.success) {
                    localStorage.setItem("userId", sonuc.user.id);
                    localStorage.setItem("userRole", sonuc.user.role);
                    
                    if (sonuc.user.role === "god") {
                        window.location.href = "god-panel.html"; 
                    } else if (sonuc.user.role === "customer") {
                        if (sonuc.user.isActive === true) {
                            window.location.href = "musteri-panel.html"; 
                        } else {
                            showError(sonuc.user.banMessage || "Abonelik süreniz dolmuş veya askıya alınmıştır.");
                        }
                    } else {
                        showError("Sistem hatası: Bu şifrenin yetkisi tanımlanmamış.");
                    }
                } else {
                    showError(sonuc.message || "Giriş başarısız. Şifreyi kontrol edin.");
                }
            } catch (error) {
                console.error("Hata Detayı:", error);
                showError("Sunucu bağlantı hatası. Vercel uykuda veya internet yok.");
            } finally {
                loginBtn.textContent = "Giriş Yap";
                loginBtn.disabled = false;
            }
        });
    </script>

</body>
</html>
